services:
  postgres:
    image: postgres:16
    container_name: cloudpos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudpos
      POSTGRES_USER: cloudpos_user
      POSTGRES_PASSWORD: cloudpos_password
    ports:
      - "5433:5432"
    volumes:
      - cloudpos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudpos_user -d cloudpos"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cloudpos_postgres_data:
